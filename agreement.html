<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umowa</title>

<style>
body{
    background:white;
    font-family:Arial, sans-serif;
    color:#b8860b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    width:80%;
    max-width:700px;
    border:2px solid #b8860b;
    border-radius:15px;
    padding:40px;
    text-align:center;
}
h1{
    color:#8b6508;
}
p{
    font-size:20px;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="box">
    <h1>Umowa ACC INVESTMENT</h1>

    <p>
        Paulina Przybek zgodziła się przestrzegać warunków i zasad
        ACC INVESTMENT, aby pomyślnie wypłacić zysk bez błędów
        oraz dodatkowych opłat.
    </p>
</div>

</body>
</html>
